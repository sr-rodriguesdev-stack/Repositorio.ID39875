<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de endereço</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Cadastro de Endereço</h1>
        </header>

        <main>
            <form>
                <input type="text" id="fullName" name="fullName" placeholder="Nome completo" required>
                <input type="text" id="phone" name="phone" placeholder="Nº de telefone" required>
                <input type="text" id="email" name="email" placeholder="E-mail" required>
                <input type="text" id="zip" name="zip" placeholder="CEP" required>
                <input type="text" id="address" name="address" placeholder="Endereço" required>
                <input type="text" id="city" name="city" placeholder="Cidade" required>
                <input type="text" id="state" name="state" placeholder="Estado" required>
                <input type="text" id="reference" name="reference" placeholder="Ponto de referência" required>

                <button type="submit" class="btn">Cadastrar</button>
            </form>
        </main>
    </div>
    <script src="../js/script.js"></script>

    <footer>
        <p>&copy; 2026 Ficha de Endereço. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
